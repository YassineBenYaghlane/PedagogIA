# Overlay for e2e parallel stacks. Merges onto the root docker-compose.yml
# and switches the per-stack named venv/node_modules volumes to external
# shared volumes — this avoids 3× `uv sync` and 3× `npm install` on every
# first boot.
services:
  backend:
    # Inject per-stack CORS/CSRF origin so Django trusts the stack's frontend port.
    # The `env_file: .env` in the base compose sets CORS_ORIGINS to 5173 — we need
    # to override it AFTER that via the `environment` block, which has higher
    # precedence than env_file.
    environment:
      # stack.sh exports CORS_ORIGINS with double-quoted JSON;
      # single-quote in YAML so the embedded " chars don't break parsing.
      CORS_ORIGINS: '${CORS_ORIGINS}'
    volumes:
      - ./backend:/app
      - e2e_backend_venv:/app/.venv
      # Per-container anonymous volume prevents 3 backends from racing on
      # the host-mounted ./backend/staticfiles during `collectstatic`.
      - /app/staticfiles

  frontend:
    volumes:
      - ./frontend:/app
      - e2e_frontend_node_modules:/app/node_modules

volumes:
  e2e_backend_venv:
    external: true
  e2e_frontend_node_modules:
    external: true
