name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ceb
          POSTGRES_PASSWORD: ceb
          POSTGRES_DB: ceb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ceb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://ceb:ceb@localhost:5432/ceb
      DJANGO_SECRET_KEY: ci-insecure
      ANTHROPIC_API_KEY: sk-ci-fake
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
      GOOGLE_OAUTH_CALLBACK_URL: http://localhost/cb
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
