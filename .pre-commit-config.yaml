repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && node_modules/.bin/eslint --fix "${@#frontend/}"' --
        language: system
        files: ^frontend/.*\.(js|jsx)$
        exclude: ^frontend/(dist|node_modules)/
