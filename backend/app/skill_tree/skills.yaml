# PedagogIA Skill Tree — Champ 3: De l'arithmétique à l'algèbre
# Derived from FWB Référentiel de Mathématiques (tronc commun)
#
# Each skill has:
#   id: unique identifier
#   label: French display name
#   grade: P1-P6
#   description: what the student should be able to do
#   prerequisites: list of skill IDs that must be mastered first
#   mastery_threshold: consecutive correct answers needed

# =============================================================================
# P1 — 1re PRIMAIRE (nombres jusqu'à 20, addition et soustraction)
# =============================================================================

# --- Numération P1 ---
- id: num_compter_20
  label: "Compter jusqu'à 20"
  grade: P1
  description: "Dire les nombres dans l'ordre stable jusqu'à 20, compter par 2 et par 5"
  prerequisites: []
  mastery_threshold: 3

- id: num_lire_ecrire_20
  label: "Lire et écrire les nombres jusqu'à 20"
  grade: P1
  description: "Dire, lire les nombres jusqu'à 20 et les écrire en chiffres"
  prerequisites: [num_compter_20]
  mastery_threshold: 3

- id: num_dizaines_unites_20
  label: "Dizaines et unités (jusqu'à 20)"
  grade: P1
  description: "Représenter les nombres jusqu'à 20 en dizaines et unités (ex: 17 = 1D et 7U)"
  prerequisites: [num_lire_ecrire_20]
  mastery_threshold: 3

- id: num_comparer_ordonner_20
  label: "Comparer et ordonner jusqu'à 20"
  grade: P1
  description: "Utiliser <, >, = pour comparer deux nombres jusqu'à 20"
  prerequisites: [num_lire_ecrire_20]
  mastery_threshold: 3

- id: num_decomposer_20
  label: "Décomposer les nombres jusqu'à 20"
  grade: P1
  description: "Décomposer et recomposer en deux termes (ex: 15 = 8 + 7)"
  prerequisites: [num_dizaines_unites_20]
  mastery_threshold: 3

# --- Addition P1 ---
- id: add_sens
  label: "Sens de l'addition"
  grade: P1
  description: "Comprendre que l'addition c'est ajouter, mettre ensemble"
  prerequisites: [num_compter_20]
  mastery_threshold: 3

- id: add_complements_10
  label: "Compléments à 10"
  grade: P1
  description: "Connaitre de mémoire les additions dont le résultat vaut 10 (ex: 7 + 3 = 10)"
  prerequisites: [add_sens, num_decomposer_20]
  mastery_threshold: 5

- id: add_faits_10
  label: "Additions dont le résultat vaut au maximum 10"
  grade: P1
  description: "Connaitre de mémoire toutes les additions dont le résultat ≤ 10"
  prerequisites: [add_sens]
  mastery_threshold: 5

- id: add_sans_retenue_20
  label: "Addition sans retenue (jusqu'à 20)"
  grade: P1
  description: "Additionner deux nombres dont la somme ≤ 20, sans retenue aux unités"
  prerequisites: [add_faits_10, num_dizaines_unites_20]
  mastery_threshold: 3

- id: add_avec_retenue_20
  label: "Addition avec retenue (jusqu'à 20)"
  grade: P1
  description: "Additionner deux nombres dont la somme ≤ 20, avec retenue (ex: 8 + 5 = 13)"
  prerequisites: [add_complements_10, add_sans_retenue_20]
  mastery_threshold: 3

# --- Soustraction P1 ---
- id: soustr_sens
  label: "Sens de la soustraction"
  grade: P1
  description: "Comprendre que la soustraction c'est enlever, reculer, trouver la différence"
  prerequisites: [num_compter_20]
  mastery_threshold: 3

- id: soustr_faits_10
  label: "Soustractions depuis un maximum de 10"
  grade: P1
  description: "Connaitre de mémoire les soustractions dont le premier terme ≤ 10"
  prerequisites: [soustr_sens]
  mastery_threshold: 5

- id: soustr_sans_emprunt_20
  label: "Soustraction sans emprunt (jusqu'à 20)"
  grade: P1
  description: "Soustraire sans emprunt avec résultat ≥ 0 et nombres ≤ 20"
  prerequisites: [soustr_faits_10, num_dizaines_unites_20]
  mastery_threshold: 3

# --- Propriétés P1 ---
- id: prop_commutativite_add
  label: "Commutativité de l'addition"
  grade: P1
  description: "Savoir que a + b = b + a"
  prerequisites: [add_sans_retenue_20]
  mastery_threshold: 3

# =============================================================================
# P2 — 2e PRIMAIRE (nombres jusqu'à 100, multiplication introduite)
# =============================================================================

# --- Numération P2 ---
- id: num_compter_100
  label: "Compter jusqu'à 100"
  grade: P2
  description: "Dire les nombres dans l'ordre stable jusqu'à 100, compter par 2, 5, 10"
  prerequisites: [num_compter_20]
  mastery_threshold: 3

- id: num_lire_ecrire_100
  label: "Lire et écrire les nombres jusqu'à 100"
  grade: P2
  description: "Dire, lire des nombres jusqu'à 100 et les écrire en chiffres"
  prerequisites: [num_compter_100, num_lire_ecrire_20]
  mastery_threshold: 3

- id: num_dizaines_unites_100
  label: "Dizaines et unités (jusqu'à 100)"
  grade: P2
  description: "Représenter les nombres de 20 à 100 en dizaines et unités (ex: 76 = 7D et 6U)"
  prerequisites: [num_lire_ecrire_100, num_dizaines_unites_20]
  mastery_threshold: 3

- id: num_comparer_ordonner_100
  label: "Comparer et ordonner jusqu'à 100"
  grade: P2
  description: "Utiliser <, >, = et ordonner des nombres de 1 à 100"
  prerequisites: [num_lire_ecrire_100, num_comparer_ordonner_20]
  mastery_threshold: 3

- id: num_decomposer_100
  label: "Décomposer les nombres jusqu'à 100"
  grade: P2
  description: "Décomposer et recomposer des nombres jusqu'à 100 en deux termes"
  prerequisites: [num_dizaines_unites_100]
  mastery_threshold: 3

- id: num_pair_impair
  label: "Pair et impair"
  grade: P2
  description: "Reconnaitre si un nombre est pair ou impair"
  prerequisites: [num_lire_ecrire_100]
  mastery_threshold: 3

# --- Addition P2 ---
- id: add_tables_10
  label: "Tables d'addition des 10 premiers nombres"
  grade: P2
  description: "Connaitre de mémoire les tables d'addition des dix premiers nombres"
  prerequisites: [add_faits_10, add_complements_10]
  mastery_threshold: 5

- id: add_doubles_20
  label: "Doubles jusqu'à 20"
  grade: P2
  description: "Connaitre de mémoire les doubles jusqu'à 20 (ex: 8 + 8 = 16)"
  prerequisites: [add_tables_10]
  mastery_threshold: 5

- id: add_sans_retenue_100
  label: "Addition sans retenue (jusqu'à 100)"
  grade: P2
  description: "Additionner deux nombres à deux chiffres sans retenue"
  prerequisites: [add_tables_10, num_dizaines_unites_100, add_avec_retenue_20]
  mastery_threshold: 3

- id: add_avec_retenue_100
  label: "Addition avec retenue (jusqu'à 100)"
  grade: P2
  description: "Additionner deux nombres à deux chiffres avec retenue"
  prerequisites: [add_complements_10, add_sans_retenue_100]
  mastery_threshold: 3

# --- Soustraction P2 ---
- id: soustr_sans_emprunt_100
  label: "Soustraction sans emprunt (jusqu'à 100)"
  grade: P2
  description: "Soustraire deux nombres à deux chiffres sans emprunt"
  prerequisites: [soustr_sans_emprunt_20, soustr_faits_10, num_dizaines_unites_100]
  mastery_threshold: 3

- id: soustr_avec_emprunt_100
  label: "Soustraction avec emprunt (jusqu'à 100)"
  grade: P2
  description: "Soustraire deux nombres à deux chiffres avec emprunt"
  prerequisites: [soustr_sans_emprunt_100, add_complements_10]
  mastery_threshold: 3

- id: soustr_moities_20
  label: "Moitiés des nombres pairs jusqu'à 20"
  grade: P2
  description: "Connaitre de mémoire les moitiés des nombres pairs jusqu'à 20"
  prerequisites: [add_doubles_20, soustr_faits_10]
  mastery_threshold: 5

# --- Multiplication P2 ---
- id: mult_sens
  label: "Sens de la multiplication"
  grade: P2
  description: "Comprendre la multiplication comme addition réitérée (ex: 3 × 4 = 4 + 4 + 4)"
  prerequisites: [add_tables_10]
  mastery_threshold: 3

- id: mult_T2
  label: "Table de 2"
  grade: P2
  description: "Connaitre de mémoire la table de multiplication par 2"
  prerequisites: [mult_sens, add_doubles_20]
  mastery_threshold: 5

- id: mult_T5
  label: "Table de 5"
  grade: P2
  description: "Connaitre de mémoire la table de multiplication par 5"
  prerequisites: [mult_sens]
  mastery_threshold: 5

- id: mult_T10
  label: "Table de 10"
  grade: P2
  description: "Connaitre de mémoire la table de multiplication par 10"
  prerequisites: [mult_sens, num_dizaines_unites_100]
  mastery_threshold: 5

# --- Propriétés P2 ---
- id: prop_commutativite_mult
  label: "Commutativité de la multiplication"
  grade: P2
  description: "Savoir que a × b = b × a"
  prerequisites: [mult_sens]
  mastery_threshold: 3

- id: prop_associativite_add
  label: "Associativité de l'addition"
  grade: P2
  description: "Savoir que (a + b) + c = a + (b + c)"
  prerequisites: [add_avec_retenue_100]
  mastery_threshold: 3

# --- Calcul mental P2 ---
- id: cm_decomposition_add_100
  label: "Calcul mental: décomposition (addition jusqu'à 100)"
  grade: P2
  description: "Utiliser la décomposition pour additionner (ex: 36 + 27 = 36 + 20 + 7)"
  prerequisites: [add_avec_retenue_100, num_decomposer_100, prop_associativite_add]
  mastery_threshold: 3

- id: cm_decomposition_soustr_100
  label: "Calcul mental: décomposition (soustraction jusqu'à 100)"
  grade: P2
  description: "Utiliser la décomposition pour soustraire (ex: 63 − 27 = 63 − 20 − 7)"
  prerequisites: [soustr_avec_emprunt_100, num_decomposer_100]
  mastery_threshold: 3

- id: cm_mult_par_10
  label: "Multiplier par 10"
  grade: P2
  description: "Effectuer des multiplications par 10 (ex: 7 × 10 = 70)"
  prerequisites: [mult_T10]
  mastery_threshold: 3

- id: cm_mult_par_20
  label: "Multiplier par 20"
  grade: P2
  description: "Effectuer des multiplications par 20 (ex: 5 × 20 = 100)"
  prerequisites: [cm_mult_par_10, mult_T2]
  mastery_threshold: 3

# --- Décompositions clés P2 ---
- id: num_decomposer_100_cle
  label: "Décompositions de 100"
  grade: P2
  description: "Décomposer 100 additivement et multiplicativement (ex: 100 = 80 + 20, 100 = 4 × 25)"
  prerequisites: [num_decomposer_100, mult_T10]
  mastery_threshold: 3

