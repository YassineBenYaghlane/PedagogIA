      a_min: 1
      a_max: 100
      b_min: 1
      b_max: 100
      decimals: 3
    prompt_template: "{a} … {b}"
    answer_key: symbol

- id: num_decomposer_1__fill_blank_1
  skill_id: num_decomposer_1
  difficulty: 1
  input_type: number
  template:
    type: fill_blank
    operation: add
    params:
      fixed_a: [0.1, 0.2, 0.25, 0.3, 0.4, 0.5, 0.6, 0.7, 0.75, 0.8, 0.9]
      b_min: 0
      b_max: 1
      decimals: 2
      result_max: 1
      result_min: 1
      blank_position: b
    prompt_template: "{a} + ? = 1"
    answer_key: b

- id: num_compter_decimaux__fill_blank_1
  skill_id: num_compter_decimaux
  difficulty: 1
  input_type: number
