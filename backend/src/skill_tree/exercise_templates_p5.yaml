# --- Numération P5 ---

- id: num_lire_ecrire_million__decomposition_1
  skill_id: num_lire_ecrire_million
  difficulty: 1
  input_type: number
  template:
    type: decomposition
    operation: null
    params:
      target_min: 100000
      target_max: 9999999
      places: ["millions", "centaines de mille", "dizaines de mille", "milliers", "centaines", "dizaines", "unités"]
    prompt_template: "Combien font {parts} ?"
    answer_key: target

- id: num_decimaux_milliemes__comparison_1
