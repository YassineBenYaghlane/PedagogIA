# --- Numération P6 ---

- id: num_lire_ecrire_milliard__decomposition_1
  skill_id: num_lire_ecrire_milliard
  difficulty: 1
  input_type: number
  template:
    type: decomposition
    operation: null
    params:
      target_min: 1000000
      target_max: 999999999
      places: ["millions", "centaines de mille", "dizaines de mille", "milliers", "centaines", "dizaines", "unités"]
    prompt_template: "Combien font {parts} ?"
    answer_key: target

