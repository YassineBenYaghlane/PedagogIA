services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ceb
      POSTGRES_USER: ceb
      POSTGRES_PASSWORD: ceb
    ports:
      - "5411:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ceb:ceb@db:5432/ceb
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/code
    working_dir: /code

volumes:
  pgdata:
