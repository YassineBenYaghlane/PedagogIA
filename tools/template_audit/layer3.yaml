summary:
  reviewer: claude-opus-4-7
  date: 2026-04-22
  method: 'Read every template YAML, cross-referenced with skills.yaml + FWB référentiel

    anchor in vault/wiki/concepts/champ-3-arithmetique. Scored alignment, age-fit,

    clarity, distractor quality (MCQ only), ambiguity. Extracted systemic issues

    below — per-template JSON is scored by script against these patterns.

    '
  status: 'All items tagged with `resolved: true` have been fixed in the YAML/generator

    and no longer apply. `combine.py` skips resolved flags when scoring.

    '
critical_bugs:
- id: num_pair_impair__fill_blank_1
  skill_id: num_pair_impair
  issue: 'Uses template.type=comparison with prompt "{a} … {b}", so student fills <,>,=.

    Skill is "Reconnaitre si un nombre est pair ou impair" — comparison doesn''t

    target pair/impair at all. The template is the wrong exercise type entirely.

    '
  fix: Replace with a dedicated classification exercise or MCQ asking "Is {a} pair or impair?"
  resolved: true
- id: num_decomposer_1__drag_order_1
  skill_id: num_decomposer_1
  issue: 'drag_order with item_min=1000, item_max=9999 — generates 4-digit integers to order.

    Skill is "Décomposer 1 additivement en dixièmes (ex: 1 = 0,5 + 0,5)".

    Integer ordering has no relation to decomposing 1.

    '
  fix: Replace with drag_order using fixed_items of decimal pairs/complements to 1.
  resolved: true
- id: num_compter_decimaux__fill_blank_1
  skill_id: num_compter_decimaux
  issue: 'mode=sequence with step=1 (integer). Skill explicitly requires counting by

    0,1 / 0,2 / 0,5 / 0,25 / 0,125. Generated sequences like "0,1,2,3,4" are

    integer counting, not decimal.

    '
  fix: Add decimal_step param to generator OR use fixed decimal step values.
  resolved: true
- id: num_compter_decimaux__point_on_line_1
  skill_id: num_compter_decimaux
  issue: Integer step on a line that should surface decimal positions.
  fix: Use point_on_line with decimal step (requires generator update).
  resolved: true
- id: maitrise_calcul_mental__computation_1
  skill_id: maitrise_calcul_mental
  issue: 'Template type is missing_operator but input_type is "number". The answer is

    an operator symbol (+, −, ×), so input_type should be "symbol".

    '
  fix: Change input_type to "symbol".
  resolved: true
- id: resolution_problemes__missing_operator_1
  skill_id: resolution_problemes
  issue: Same mismatch as above — input_type=number but answer is operator.
  fix: Change input_type to "symbol".
  resolved: true
- id: num_lire_ecrire_milliard__decomposition_1
  skill_id: num_lire_ecrire_milliard
  issue: 'places list tops at "millions"; target_max=999_999_999 (just under 1 G).

    Label says "jusqu''au milliard" — missing "milliards" place.

    '
  fix: Add "milliards" to places and extend target_max to 999_999_999_999.
  resolved: true
broken_constraints:
- id: num_decomposer_100_cle__fill_blank_1
  retry_rate: 0.53
  issue: 'fixed_a=[10,20,25,30,40,50,60,70,75,80,90], b in [10,90], result must equal

    exactly 100. Many fixed_a values (25, 75) have complements (75, 25) in

    range but b is chosen independently; only ~47% of draws complete a+b=100.

    '
  fix: Make generator compute b = 100 - a directly for this pattern, or shift to a targeted generator.
  resolved: true
- id: num_decomposer_1__fill_blank_1
  retry_rate: 0.61
  issue: 'fixed_a list of decimals, b in [0,1] with decimals=2, result must equal 1.

    39% of draws complete. Same family of issue.

    '
  fix: Generator should compute complement directly when result_min=result_max.
  resolved: true
- id: add_complements_10__fill_blank_1
  retry_rate: 0.002
  issue: Similar pattern but rate is low (a,b in 1-9, result=10 possible ~11% of pairs).
  fix: Low priority — generator fix above also covers this.
  resolved: true
degenerate_heavy:
- id: __mult_tables_pattern
  pattern: All multiplication-table templates (mult_T2..T10, computation + MCQ)
  issue: 'b in [1,10] so ~10% of draws have b=1 → "3 × 1 = ?" is trivial.

    '
  fix: Set b_min=2 and bump b_max to 12 to keep variety.
  affected:
  - mult_T2__computation_1
  - mult_T2__mcq_1
  - mult_T3__computation_1
  - mult_T3__mcq_1
  - mult_T4__computation_1
  - mult_T4__mcq_1
  - mult_T5__computation_1
  - mult_T5__mcq_1
  - mult_T6__computation_1
  - mult_T6__mcq_1
  - mult_T7__computation_1
  - mult_T8__computation_1
  - mult_T9__computation_1
  - mult_T10__computation_1
  resolved: true
- id: soustr_moities_20__computation_1
  issue: 'fixed_a includes 2, so "La moitié de 2 = 1" triggers divide_equal (a=b).

    Pedagogically boring for a student practicing halving.

    '
  fix: Remove 2 from fixed_a.
  resolved: true
