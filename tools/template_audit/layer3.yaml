missing_tiers:
  strategy: "For each single-tier skill with acceptable variety (>500 variants on the\nexisting template), add difficulty 2 variant with:\n  - wider parameter ranges, or\n  - MCQ form with smart distractors, or\n  - inverse operation (fill_blank at a instead of b, or missing_operator).\nFor skills with thin coverage (<100 variants), FIRST fix the base template,\nTHEN add a second tier.\n"
mcq_notes: 'Current strategy: correct ± random delta in [-spread, spread], filter 0 and duplicates.

  Pedagogically this produces reasonable "close miss" distractors but misses

  structured misconceptions (neighbor-table for multiplication, place-value swaps

  for larger numbers). A future upgrade could add `distractor_strategy: "neighbor_table"`

  or "place_value_swap" — flagged as out-of-scope for this overnight pass.

  '
alignment_notes: 'All templates target valid skills from the skills.yaml tree, which itself is

  derived from the 2022 référentiel. No off-curriculum exercises were found.

  The arithmétique Champ-3 skill tree is well represented P1→P6; the referential

  branches Champ 1 (géométrie), Champ 2 (grandeurs), Champ 4 (données) are

  intentionally out of POC scope and have no templates — this is expected.

  '
typography_notes: 'Layer 2 found zero issues. All prompts respect French typography (space before

  : ? ! ; and the minus-sign uses U+2212 "−" not ASCII "-"). Keep as-is.

  '
